name: Windows agent CI

on:
  push:
  pull_request:

jobs:
  agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore .\agent\Dokladovka.Agent.sln
      - run: dotnet test .\agent\Dokladovka.Agent.sln --configuration Release
      - shell: pwsh
        run: .\agent\scripts\publish.ps1 -Runtime win-x64 -Version 0.1.0
      - shell: pwsh
        run: choco install innosetup --yes --no-progress
      - shell: pwsh
        run: .\agent\scripts\build-installer.ps1 -Iscc 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' -Version 0.1.0 -Development
      - shell: pwsh
        run: |
          $setup = Get-Item .\agent\artifacts\Dokladovka-Agent-Setup-0.1.0-UNSIGNED-DEV.exe
          $manifest = Get-Content .\agent\artifacts\release-manifest.json -Raw | ConvertFrom-Json
          if ($manifest.signed -or $manifest.channel -ne 'development') { throw 'Development artifact nie je správne označený.' }
          if ((Get-FileHash $setup.FullName -Algorithm SHA256).Hash.ToLowerInvariant() -ne $manifest.sha256) { throw 'SHA-256 nesúhlasí.' }
      - uses: actions/upload-artifact@v4
        with:
          name: dokladovka-agent-win-x64-UNSIGNED-DEV
          path: agent/artifacts/*
