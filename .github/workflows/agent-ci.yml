name: Windows agent CI

on:
  push:
  pull_request:

jobs:
  agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - shell: pwsh
        run: .\agent\scripts\fetch-pohoda-xsd.ps1
      - run: dotnet test .\agent\Dokladovka.Agent.sln --configuration Release
      - shell: pwsh
        run: .\agent\scripts\publish.ps1 -Runtime win-x64
      - shell: pwsh
        run: choco install innosetup --yes --no-progress
      - shell: pwsh
        run: .\agent\scripts\build-installer.ps1 -Iscc 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
      - uses: actions/upload-artifact@v4
        with:
          name: dokladovka-agent-win-x64
          path: agent/artifacts/*
