services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dokladovka
      POSTGRES_USER: dokladovka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokladovka -d dokladovka"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dokladovka-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-only-change-me}
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done;
        mc mb --ignore-existing local/dokladovka-private;
        mc anonymous set none local/dokladovka-private
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dokladovka-local}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-only-change-me}

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET:-local-only-change-me}
      DOCUMENT_EXTRACTION_PROVIDER: mock
      OBJECT_STORAGE_MODE: s3
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_REGION: eu-central-1
      OBJECT_STORAGE_BUCKET: dokladovka-private
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-dokladovka-local}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-local-only-change-me}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "3001:3001"

  worker:
    build: .
    command: ["node", "build/server/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      DOCUMENT_EXTRACTION_PROVIDER: mock
      OBJECT_STORAGE_MODE: s3
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_REGION: eu-central-1
      OBJECT_STORAGE_BUCKET: dokladovka-private
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-dokladovka-local}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-local-only-change-me}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"

  monitor:
    build: .
    command: ["node", "build/server/monitor.js"]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      OBJECT_STORAGE_MODE: s3
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_REGION: eu-central-1
      OBJECT_STORAGE_BUCKET: dokladovka-private
      OBJECT_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-dokladovka-local}
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-local-only-change-me}
      AGENT_OFFLINE_ALERT_HOURS: ${AGENT_OFFLINE_ALERT_HOURS:-2}
      EXPORT_FAILURE_ALERT_PERCENT: ${EXPORT_FAILURE_ALERT_PERCENT:-20}
      MONITOR_INTERVAL_MS: ${MONITOR_INTERVAL_MS:-60000}

volumes:
  postgres-data:
  minio-data:
