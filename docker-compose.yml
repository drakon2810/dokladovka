services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dokladovka
      POSTGRES_USER: dokladovka
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokladovka -d dokladovka"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET:-local-only-change-me}
      DOCUMENT_EXTRACTION_PROVIDER: ${DOCUMENT_EXTRACTION_PROVIDER:-mock}
      # AI funkcie bežiace v API procese (Analyzovať pamäť, návrhy zaúčtovania,
      # DPH poradca) potrebujú kľúč aj tu, nielen vo `worker` — inak endpoint
      # /ai-training/analyze vráti „AI analýza nie je nakonfigurovaná".
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-terra}
      OPENAI_ACCOUNTING_FALLBACK_MODEL: ${OPENAI_ACCOUNTING_FALLBACK_MODEL:-}
      OPENAI_RULE_ANALYSIS_MODEL: ${OPENAI_RULE_ANALYSIS_MODEL:-}
      OPENAI_STORE_RESPONSES: ${OPENAI_STORE_RESPONSES:-false}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-120000}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-2}
      EXTRACTION_MAX_FILE_BYTES: ${EXTRACTION_MAX_FILE_BYTES:-20971520}
      EXTRACTION_MAX_PDF_PAGES: ${EXTRACTION_MAX_PDF_PAGES:-50}
      # Filesystem object storage na perzistentnom volume (MinIO/S3 netreba pri
      # single-node nasadení). Zdieľané s worker/monitor cez rovnaký volume.
      OBJECT_STORAGE_MODE: filesystem
      OBJECT_STORAGE_FILESYSTEM_ROOT: /data/objects
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      # Len pre jednorazový `docker compose run api node build/server/db/seed.js`.
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    volumes:
      - objects-data:/data/objects
    # Port nie je publikovaný von — chodí sa naň iba cez Caddy (web).

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "build/server/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      DOCUMENT_EXTRACTION_PROVIDER: ${DOCUMENT_EXTRACTION_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-terra}
      OPENAI_STORE_RESPONSES: ${OPENAI_STORE_RESPONSES:-false}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-120000}
      OPENAI_MAX_RETRIES: ${OPENAI_MAX_RETRIES:-2}
      EXTRACTION_MAX_FILE_BYTES: ${EXTRACTION_MAX_FILE_BYTES:-20971520}
      EXTRACTION_MAX_PDF_PAGES: ${EXTRACTION_MAX_PDF_PAGES:-50}
      OBJECT_STORAGE_MODE: filesystem
      OBJECT_STORAGE_FILESYSTEM_ROOT: /data/objects
    volumes:
      - objects-data:/data/objects

  imap:
    build: .
    restart: unless-stopped
    command: ["node", "build/server/imap.js"]
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: production
      # Poller DB reálne nepoužíva (len parsuje poštu a volá inbound webhook), ale
      # zdieľaný loadConfig() v produkcii DATABASE_URL vyžaduje — inak spadne na štarte.
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      API_BASE_URL: http://api:3001
      INBOUND_WEBHOOK_SECRET: ${INBOUND_WEBHOOK_SECRET:-local-only-change-me}
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_POLL_INTERVAL: ${IMAP_POLL_INTERVAL:-30}
      IMAP_MAILBOX: ${IMAP_MAILBOX:-INBOX}

  monitor:
    build: .
    restart: unless-stopped
    command: ["node", "build/server/monitor.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dokladovka:${POSTGRES_PASSWORD:-local-only-change-me}@postgres:5432/dokladovka
      MAIL_RECEIVING_DOMAIN: ${MAIL_RECEIVING_DOMAIN:-doklady.localhost.test}
      OBJECT_STORAGE_MODE: filesystem
      OBJECT_STORAGE_FILESYSTEM_ROOT: /data/objects
      AGENT_OFFLINE_ALERT_HOURS: ${AGENT_OFFLINE_ALERT_HOURS:-2}
      EXPORT_FAILURE_ALERT_PERCENT: ${EXPORT_FAILURE_ALERT_PERCENT:-20}
      MONITOR_INTERVAL_MS: ${MONITOR_INTERVAL_MS:-60000}
    volumes:
      - objects-data:/data/objects

volumes:
  postgres-data:
  objects-data:
  caddy-data:
  caddy-config:
